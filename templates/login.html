<!DOCTYPE html>
<html>
<head>
<title>SkillSphere Login</title>
<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#eef3ff,#f7fbff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:450px;
background:white;
padding:50px;
border-radius:30px;
box-shadow:0 12px 40px rgba(0,0,0,.08);
}

.logo{
font-size:38px;
font-weight:800;
margin-bottom:10px;
color:#2d3b8f;
}

.sub{
color:#666;
margin-bottom:35px;
}

input{
width:100%;
padding:16px;
margin-bottom:18px;
border:1px solid #ddd;
border-radius:14px;
font-size:16px;
}

button{
width:100%;
background:#4f46e5;
color:white;
border:none;
padding:16px;
border-radius:14px;
font-size:18px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

.register{
margin-top:22px;
text-align:center;
}

.register a{
text-decoration:none;
color:#4f46e5;
font-weight:600;
}

.alert{
background:#eaf8ee;
padding:14px;
border-radius:12px;
margin-bottom:20px;
text-align:center;
color:#16753d;
}

</style>
</head>
<body>

<div class="box">

<div class="logo">SkillSphere</div>
<div class="sub">
Track • Verify • Manage Certifications
</div>

{% if messages %}
{% for message in messages %}
<div class="alert">
{{ message }}
</div>
{% endfor %}
{% endif %}

<form method="post">
{% csrf_token %}
<input type="text" name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">

<button type="submit">
Login
</button>
</form>

<div class="register">
New user?
<a href="/register/">Create Account</a>
</div>

</div>

</body>
</html>
