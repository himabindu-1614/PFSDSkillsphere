<!DOCTYPE html>
<html>
<head>
    <title>Register | SkillSphere</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f8fafc;
        }

        .auth-wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            width: 400px;
            padding: 35px;
            background: white;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #93c5fd;
            cursor: pointer;
        }

        .secondary {
            background: #e2e8f0;
            margin-top: 10px;
            display: block;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            color: black;
        }

    </style>
</head>
<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <h2>Create Account ✨</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username">
            <input type="email" name="email" placeholder="Email">
            <input type="password" name="password" placeholder="Password">

            <button class="btn">Register</button>

        </form>

        <a href="/" class="secondary">Back to Login</a>

    </div>

</div>

</body>
</html>
